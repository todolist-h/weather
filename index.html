<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熱中症警戒サイネージ - 大分上野丘高校</title>
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 視認性の高いGoogle Fonts (Noto Sans JP) の読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            /* サイネージ用途のためスクロールバーを非表示 */
            overflow: hidden; 
        }
        .text-shadow { text-shadow: 0px 4px 10px rgba(0,0,0,0.3); }
        .text-shadow-strong { text-shadow: 0px 4px 15px rgba(0,0,0,0.6); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col transition-colors duration-1000 bg-gray-200" id="main-bg">
    
    <!-- ヘッダー：タイトルと現在時刻 -->
    <header class="p-6 flex justify-between items-center bg-black/10 backdrop-blur-sm text-gray-800" id="header-text">
        <div class="flex items-center gap-4">
            <!-- アイコン用SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <div>
                <h1 class="text-4xl font-bold tracking-widest">熱中症予防情報</h1>
                <p class="text-xl font-bold opacity-70">大分県立大分上野丘高等学校</p>
            </div>
        </div>
        <div class="text-right">
            <div id="date-display" class="text-3xl font-bold tracking-wider">----年--月--日(-)</div>
            <div id="time-display" class="text-7xl font-black font-mono tracking-tighter mt-1">--:--</div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow flex flex-col justify-center items-center p-10 text-center">
        
        <!-- 警戒レベル表示エリア -->
        <div id="alert-level-box" class="rounded-[3rem] py-10 px-24 shadow-2xl mb-12 bg-white text-gray-800 border-8 border-transparent transition-all duration-700 w-full max-w-6xl">
            <p class="text-4xl font-bold mb-4 opacity-80">現在の警戒レベル</p>
            <h2 id="alert-level-text" class="text-[8rem] leading-tight font-black tracking-wider">情報取得中...</h2>
            <div class="mt-6 inline-block bg-black/5 rounded-full px-8 py-4">
                <p id="alert-message" class="text-4xl font-bold">少々お待ちください</p>
            </div>
        </div>

        <!-- 数値情報表示エリア -->
        <div class="grid grid-cols-3 gap-10 w-full max-w-6xl">
            <!-- WBGT -->
            <div class="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center border-b-8 border-gray-300" id="card-wbgt">
                <span class="text-3xl font-bold text-gray-600 mb-4">暑さ指数 (WBGT)</span>
                <div class="flex items-baseline gap-2">
                    <span id="wbgt-value" class="text-8xl font-black text-gray-800">--.-</span>
                    <span class="text-4xl font-bold text-gray-500">℃</span>
                </div>
            </div>
            
            <!-- 気温 -->
            <div class="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center">
                <span class="text-3xl font-bold text-gray-600 mb-4">気温</span>
                <div class="flex items-baseline gap-2">
                    <span id="temp-value" class="text-7xl font-black text-gray-800">--.-</span>
                    <span class="text-4xl font-bold text-gray-500">℃</span>
                </div>
            </div>

            <!-- 湿度 -->
            <div class="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center">
                <span class="text-3xl font-bold text-gray-600 mb-4">湿度</span>
                <div class="flex items-baseline gap-2">
                    <span id="humid-value" class="text-7xl font-black text-gray-800">--</span>
                    <span class="text-4xl font-bold text-gray-500">%</span>
                </div>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer class="p-4 text-center bg-black/10 backdrop-blur-sm text-gray-800" id="footer-text">
        <p class="text-2xl font-bold tracking-wide">
            ※大分市の気象データから算出した推定値です。目安としてご活用ください。
        </p>
    </footer>

    <script>
        // 設定値
        // 大分県立大分上野丘高等学校の座標
        const LATITUDE = 33.2269;
        const LONGITUDE = 131.6119;
        const FETCH_INTERVAL_MS = 10 * 60 * 1000; // 10分ごとに気象データを更新

        // DOM要素の取得
        const elDate = document.getElementById('date-display');
        const elTime = document.getElementById('time-display');
        const elMainBg = document.getElementById('main-bg');
        const elAlertBox = document.getElementById('alert-level-box');
        const elAlertText = document.getElementById('alert-level-text');
        const elAlertMsg = document.getElementById('alert-message');
        const elWbgt = document.getElementById('wbgt-value');
        const elTemp = document.getElementById('temp-value');
        const elHumid = document.getElementById('humid-value');
        const elCardWbgt = document.getElementById('card-wbgt');
        const elHeaderText = document.getElementById('header-text');
        const elFooterText = document.getElementById('footer-text');

        /**
         * 時計の更新
         */
        function updateClock() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const day = days[now.getDay()];
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            elDate.textContent = `${year}年${month}月${date}日(${day})`;
            elTime.textContent = `${hours}:${minutes}`;
        }

        /**
         * 気温と湿度からWBGTを推定計算する
         * @param {number} temp 気温(℃)
         * @param {number} humid 湿度(%)
         * @returns {number} WBGT推定値
         */
        function calculateWBGT(temp, humid) {
            return 0.735 * temp + 0.0374 * humid + 0.00292 * temp * humid + 7.619;
        }

        /**
         * WBGT値に基づきUIを更新する
         */
        function updateAlertUI(wbgt) {
            let levelText = "";
            let msgText = "";
            let bgColorClass = "";
            let boxColorClass = "";
            let msgColorClass = "";
            let textColorClass = "text-gray-800";

            if (wbgt >= 31.0) {
                levelText = "危険";
                msgText = "運動は原則中止！涼しい部屋へ避難";
                bgColorClass = "bg-red-700";
                boxColorClass = "border-red-500 text-red-600";
                msgColorClass = "text-red-700";
                textColorClass = "text-white";
                elCardWbgt.className = "bg-red-100 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center border-b-8 border-red-500";
            } else if (wbgt >= 28.0) {
                levelText = "厳重警戒";
                msgText = "激しい運動は中止！こまめな休憩を";
                bgColorClass = "bg-orange-500";
                boxColorClass = "border-orange-400 text-orange-600";
                msgColorClass = "text-orange-700";
                elCardWbgt.className = "bg-orange-50 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center border-b-8 border-orange-400";
            } else if (wbgt >= 25.0) {
                levelText = "警戒";
                msgText = "積極的に休息を！水分・塩分補給";
                bgColorClass = "bg-yellow-400";
                boxColorClass = "border-yellow-400 text-yellow-600";
                msgColorClass = "text-yellow-700";
                elCardWbgt.className = "bg-yellow-50 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center border-b-8 border-yellow-400";
            } else if (wbgt >= 21.0) {
                levelText = "注意";
                msgText = "積極的に水分補給を";
                bgColorClass = "bg-cyan-400";
                boxColorClass = "border-cyan-400 text-cyan-600";
                msgColorClass = "text-cyan-700";
                elCardWbgt.className = "bg-cyan-50 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center border-b-8 border-cyan-400";
            } else {
                levelText = "ほぼ安全";
                msgText = "通常通り（適宜水分補給を）";
                bgColorClass = "bg-green-500";
                boxColorClass = "border-green-400 text-green-600";
                msgColorClass = "text-green-700";
                textColorClass = "text-white";
                elCardWbgt.className = "bg-green-50 backdrop-blur-md rounded-3xl p-8 shadow-xl flex flex-col items-center justify-center border-b-8 border-green-400";
            }

            elAlertText.textContent = levelText;
            elAlertMsg.textContent = msgText;
            elMainBg.className = `h-screen w-screen flex flex-col transition-colors duration-1000 ${bgColorClass}`;
            elAlertBox.className = `rounded-[3rem] py-10 px-24 shadow-2xl mb-12 bg-white border-8 transition-all duration-700 w-full max-w-6xl ${boxColorClass}`;
            elAlertMsg.className = `text-4xl font-bold ${msgColorClass}`;
            elHeaderText.className = `p-6 flex justify-between items-center bg-black/20 backdrop-blur-sm ${textColorClass}`;
            elFooterText.className = `p-4 text-center bg-black/20 backdrop-blur-sm ${textColorClass}`;
        }

        /**
         * Open-Meteo APIから気象データを取得
         */
        async function fetchWeatherData() {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current=temperature_2m,relative_humidity_2m&timezone=Asia%2FTokyo`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                const temp = data.current.temperature_2m;
                const humid = data.current.relative_humidity_2m;
                const wbgt = calculateWBGT(temp, humid);
                
                elTemp.textContent = temp.toFixed(1);
                elHumid.textContent = humid;
                elWbgt.textContent = wbgt.toFixed(1);
                updateAlertUI(wbgt);
            } catch (error) {
                console.error("Failed to fetch weather data:", error);
                elAlertText.textContent = "取得エラー";
                elAlertMsg.textContent = "再試行中...";
            }
        }

        function init() {
            updateClock();
            setInterval(updateClock, 1000);
            fetchWeatherData();
            setInterval(fetchWeatherData, FETCH_INTERVAL_MS);
        }

        init();
    </script>
</body>
</html>
