<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Style Weather - Oita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-image"></div>

    <div class="container">
        <div class="main-info">
            <div id="date" class="date-display">---, --- --</div>
            <div id="clock" class="clock-display">00:00</div>
        </div>

        <div class="weather-panel glass">
            <div class="panel-header">weather</div>
            
            <div class="current-weather">
                <div class="temp-main">
                    <span id="current-temp">--</span><span class="unit">°</span>
                </div>
                <div class="weather-text-group">
                    <div id="weather-desc" class="condition">読み込み中</div>
                    <div class="location">大分県 大分市</div>
                </div>
            </div>

            <div class="weather-stats">
                <div class="stat-item">
                    <span class="stat-label">MAX</span>
                    <span id="max-temp" class="stat-value">--°</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">MIN</span>
                    <span id="min-temp" class="stat-value">--°</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">RAIN</span>
                    <span id="pop" class="stat-value">--%</span>
                </div>
            </div>

            <div class="hourly-forecast" id="hourly-container">
                </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
